<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRAINROT LEGENDS ⚡</title>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #2b1b3a 0%, #1a2f4a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #app {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Музыка */
        .music-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            color: white;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        /* Шапка */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .balance {
            font-size: 42px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .coin-icon {
            width: 50px;
            height: 50px;
            background: url('https://cdn-icons-png.flaticon.com/512/3135/3135769.png') center/contain no-repeat;
            filter: drop-shadow(0 0 20px gold);
        }

        /* Престиж */
        .prestige-bar {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            padding: 12px;
            text-align: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 16px;
        }

        .prestige-bar:hover {
            opacity: 0.9;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 5px;
            color: white;
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-weight: 800;
            color: #ffd700;
            font-size: 18px;
            margin-top: 5px;
        }

        /* Табы */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 8px 0;
            gap: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            font-size: 13px;
            border-radius: 20px 20px 0 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 -5px 20px rgba(102, 126, 234, 0.5);
        }

        /* Кликер */
        .clicker-section {
            padding: 25px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
        }

        #clickButton {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            cursor: pointer;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.5);
            background-image: url('https://static.wikia.nocookie.net/ukradite-breinrot/images/6/66/67.webp/revision/latest?cb=20250918173131&path-prefix=ru');
            background-size: cover;
            background-position: center;
            transition: transform 0.1s;
        }

        #clickButton:active {
            transform: scale(0.95);
        }

        .click-info {
            color: white;
            font-size: 18px;
        }

        #clickPower {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        /* Прогресс */
        .progress-container {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Ежедневная награда */
        .daily-reward {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            padding: 15px;
            margin: 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        /* Секции */
        .section {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            max-height: 450px;
            overflow-y: auto;
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-size: 22px;
            color: white;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 8px;
            font-weight: 700;
        }

        /* Карточки */
        .item-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .item-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: bold;
            color: white;
            font-size: 16px;
        }

        .item-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-price {
            color: #ffd700;
            font-weight: bold;
            font-size: 18px;
        }

        .buy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
        }

        .buy-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .owned-badge {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
        }

        /* Ачивки */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .achievement-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
        }

        .achievement-card.done {
            background: linear-gradient(135deg, #00b09b, #96c93d);
        }

        /* Ивент */
        .event-banner {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            padding: 10px;
            text-align: center;
            color: white;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Уведомления */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 15px 25px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            transition: 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Анимация монетки */
        @keyframes floatUp {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: translateY(-150px) scale(2); }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Музыка -->
        <div class="music-btn" id="musicBtn">🔇</div>
        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

        <!-- Шапка -->
        <div class="header">
            <h1>BRAINROT LEGENDS ⚡</h1>
            <div class="balance">
                <span id="balance">0</span>
                <div class="coin-icon"></div>
            </div>
        </div>

        <!-- Престиж -->
        <div class="prestige-bar" onclick="doPrestige()">
            ✨ ПРЕСТИЖ <span id="prestigeLevel">0</span> ✨ Множитель x<span id="prestigeMult">1.0</span>
        </div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div>Уровень<br><span class="stat-value" id="level">1</span></div>
            <div>Клики<br><span class="stat-value" id="totalClicks">0</span></div>
            <div>Доход/сек<br><span class="stat-value" id="income">0</span></div>
            <div>Стрик<br><span class="stat-value" id="streak">0</span></div>
        </div>

        <!-- Табы -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('clicker')">👆 КЛИК</div>
            <div class="tab" onclick="switchTab('shop')">🏪 БИЗНЕС</div>
            <div class="tab" onclick="switchTab('upgrades')">⚡ ПРОКАЧКА</div>
            <div class="tab" onclick="switchTab('achievements')">🏆 АЧИВКИ</div>
            <div class="tab" onclick="switchTab('skins')">🎨 СКИНЫ</div>
        </div>

        <!-- Кликер -->
        <div id="clickerSection" class="clicker-section">
            <div id="clickButton"></div>
            <div class="click-info">
                Сила клика: <span id="clickPower">1</span>
            </div>
        </div>

        <!-- Прогресс -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="levelProgress"></div>
            </div>
            <div class="level-info">
                <span id="currentLevel">Уровень 1</span>
                <span id="nextLevelExp">До 2: 100</span>
            </div>
        </div>

        <!-- Ежедневная награда -->
        <div class="daily-reward" onclick="claimDaily()">
            🔥 ЕЖЕДНЕВНАЯ НАГРАДА 🔥<br>
            <span id="dailyInfo">Заберите +100 монет!</span>
        </div>

        <!-- Баннер ивента -->
        <div id="eventBanner" class="event-banner" style="display:none;"></div>

        <!-- Секции -->
        <div id="shopSection" class="section">
            <div class="section-title">🏪 БИЗНЕС (пассивный доход)</div>
            <div id="shopItems"></div>
        </div>

        <div id="upgradesSection" class="section">
            <div class="section-title">⚡ УЛУЧШЕНИЯ КЛИКА</div>
            <div id="upgradeItems"></div>
        </div>

        <div id="achievementsSection" class="section">
            <div class="section-title">🏆 ДОСТИЖЕНИЯ</div>
            <div class="achievement-grid" id="achievementsList"></div>
        </div>

        <div id="skinsSection" class="section">
            <div class="section-title">🎨 СКИНЫ НА МОЗГ</div>
            <div id="skinsList"></div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // ========== TELEGRAM INIT ==========
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== МУЗЫКА ==========
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let musicPlaying = false;

        musicBtn.onclick = () => {
            if (musicPlaying) {
                music.pause();
                musicBtn.textContent = '🔇';
            } else {
                music.play().catch(() => {
                    showNotification('🎵 Нажми на экран для музыки');
                });
                musicBtn.textContent = '🔊';
            }
            musicPlaying = !musicPlaying;
        };

        // ========== ИГРОВЫЕ ДАННЫЕ ==========
        let gameState = {
            balance: 100,
            clickPower: 1,
            totalClicks: 0,
            
            level: 1,
            exp: 0,
            expToNext: 100,
            
            prestige: {
                level: 0,
                multiplier: 1.0
            },
            
            daily: {
                lastClaim: null,
                streak: 0
            },
            
            businesses: [
                { id: 'b1', name: '🧠 Лавка мозгов', emoji: '🧠', price: 50, income: 1, count: 0 },
                { id: 'b2', name: '🏭 Фабрика мыслей', emoji: '🏭', price: 250, income: 5, count: 0 },
                { id: 'b3', name: '🏦 Банк', emoji: '🏦', price: 1500, income: 30, count: 0 },
                { id: 'b4', name: '🚀 Нейросеть', emoji: '🚀', price: 10000, income: 200, count: 0 }
            ],
            
            upgrades: [
                { id: 'u1', name: '👓 Очки', price: 100, bonus: 2, bought: false },
                { id: 'u2', name: '☕ Кофе', price: 600, bonus: 10, bought: false },
                { id: 'u3', name: '💊 Таблетки', price: 3000, bonus: 50, bought: false },
                { id: 'u4', name: '⚡ Энергетик', price: 20000, bonus: 300, bought: false }
            ],
            
            achievements: [
                { id: 'a1', name: '1000 кликов', emoji: '👆', requirement: 1000, reward: 5000, done: false },
                { id: 'a2', name: '10000 кликов', emoji: '⚡', requirement: 10000, reward: 50000, done: false },
                { id: 'a3', name: 'Магнат', emoji: '💰', requirement: 10, reward: 100000, done: false },
                { id: 'a4', name: 'Легенда', emoji: '👑', requirement: 50, reward: 500000, done: false }
            ],
            
            skins: [
                { id: 's1', name: 'Обычный', emoji: '🧠', bonus: 1.0, price: 0, owned: true },
                { id: 's2', name: 'Золотой', emoji: '🥇', bonus: 1.5, price: 50000, owned: false },
                { id: 's3', name: 'Алмазный', emoji: '💎', bonus: 2.0, price: 200000, owned: false },
                { id: 's4', name: 'Кибер', emoji: '🤖', bonus: 3.0, price: 1000000, owned: false }
            ],
            currentSkin: 's1',
            
            activeEvent: null,
            eventEndTime: 0
        };

        // ========== DOM ЭЛЕМЕНТЫ ==========
        const balanceEl = document.getElementById('balance');
        const clickPowerEl = document.getElementById('clickPower');
        const levelEl = document.getElementById('level');
        const totalClicksEl = document.getElementById('totalClicks');
        const incomeEl = document.getElementById('income');
        const streakEl = document.getElementById('streak');
        const prestigeLevelEl = document.getElementById('prestigeLevel');
        const prestigeMultEl = document.getElementById('prestigeMult');
        const levelProgress = document.getElementById('levelProgress');
        const currentLevelEl = document.getElementById('currentLevel');
        const nextLevelExpEl = document.getElementById('nextLevelExp');
        const dailyInfoEl = document.getElementById('dailyInfo');
        const eventBanner = document.getElementById('eventBanner');
        const clickButton = document.getElementById('clickButton');
        
        const shopItemsEl = document.getElementById('shopItems');
        const upgradeItemsEl = document.getElementById('upgradeItems');
        const achievementsListEl = document.getElementById('achievementsList');
        const skinsListEl = document.getElementById('skinsList');

        // ========== ФУНКЦИИ ==========
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function createFloatingCoin(x, y) {
            const coin = document.createElement('div');
            coin.className = 'coin-icon';
            coin.style.position = 'absolute';
            coin.style.width = '30px';
            coin.style.height = '30px';
            coin.style.left = (x - 15) + 'px';
            coin.style.top = (y - 15) + 'px';
            coin.style.animation = 'floatUp 1s forwards';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 1000);
        }

        function getPassiveIncome() {
            let total = 0;
            gameState.businesses.forEach(b => total += b.income * b.count);
            total *= gameState.prestige.multiplier;
            const skin = gameState.skins.find(s => s.id === gameState.curr
