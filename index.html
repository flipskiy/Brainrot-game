<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Test</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        #app {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            width: 200px;
        }
        button:active {
            transform: scale(0.95);
        }
        #balance {
            font-size: 32px;
            color: gold;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>BRAINROT TEST</h1>
        <div id="balance">0</div>
        <button onclick="clickHandler()">КЛИКАЙ СЮДА</button>
        <button onclick="buyHandler()">КУПИТЬ ЗА 10</button>
    </div>

    <script>
        let money = 0;
        const balanceEl = document.getElementById('balance');
        
        function clickHandler() {
            money++;
            balanceEl.textContent = money;
            alert('Клик! Монет: ' + money);
        }
        
        function buyHandler() {
            if (money >= 10) {
                money -= 10;
                balanceEl.textContent = money;
                alert('Покупка успешна!');
            } else {
                alert('Не хватает монет!');
            }
        }
    </script>
</body>
</html>
