<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRAINROT LEGENDS</title>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #app {
            width: 100%;
            max-width: 420px;
            background: rgba(10, 8, 5, 0.98);
            border-radius: 40px;
            box-shadow: 0 30px 80px rgba(196, 167, 71, 0.3);
            overflow: hidden;
            border: 2px solid #ffd700;
            position: relative;
        }

        /* Музыка */
        .music-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            background: #2a2418;
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            color: gold;
            box-shadow: 0 0 20px gold;
        }

        /* Шапка */
        .header {
            background: linear-gradient(135deg, #8b7355 0%, #5d4c33 100%);
            padding: 20px;
            color: #ffd700;
            text-align: center;
            border-bottom: 3px solid gold;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #000;
        }

        .balance {
            font-size: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .coin-icon {
            width: 50px;
            height: 50px;
            background: url('https://cdn-icons-png.flaticon.com/512/3135/3135769.png') center/contain no-repeat;
            filter: drop-shadow(0 0 15px gold);
        }

        /* Престиж */
        .prestige-bar {
            background: linear-gradient(90deg, #4a2a2a, #8b4a4a);
            padding: 8px;
            text-align: center;
            color: gold;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 2px solid gold;
        }

        .prestige-bar:hover {
            background: #6a3a3a;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: #1e1a12;
            padding: 15px 5px;
            color: gold;
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid gold;
        }

        .stat-value {
            font-weight: bold;
            color: #ffd700;
            font-size: 16px;
            margin-top: 5px;
        }

        /* Табы */
        .tabs {
            display: flex;
            background: #1a140e;
            padding: 5px 5px 0;
            gap: 3px;
        }

        .tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            color: gold;
            font-weight: bold;
            font-size: 13px;
            border-radius: 20px 20px 0 0;
            background: #2a2418;
        }

        .tab.active {
            background: linear-gradient(135deg, #b89b5c 0%, #8b7355 100%);
            color: #000;
            box-shadow: 0 -5px 20px gold;
        }

        /* Кликер */
        .clicker-section {
            padding: 25px;
            text-align: center;
            background: #1e1a12;
        }

        #clickButton {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            cursor: pointer;
            border-radius: 50%;
            border: 5px solid gold;
            box-shadow: 0 0 50px gold;
            background-image: url('https://static.wikia.nocookie.net/ukradite-breinrot/images/6/66/67.webp/revision/latest?cb=20250918173131&path-prefix=ru');
            background-size: cover;
            background-position: center;
            transition: 0.1s;
        }

        #clickButton:active {
            transform: scale(0.92);
        }

        /* Прогресс */
        .progress-container {
            padding: 15px 20px;
            background: #1e1a12;
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: #2a2418;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid gold;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, gold, #ffaa00);
            width: 0%;
            transition: 0.3s;
        }

        /* Ежедневная награда */
        .daily-reward {
            background: linear-gradient(90deg, #2a4a2a, #1a3a1a);
            padding: 15px;
            margin: 10px;
            border-radius: 20px;
            border: 2px solid gold;
            cursor: pointer;
            text-align: center;
            color: gold;
        }

        /* Секции */
        .section {
            padding: 20px;
            background: #1e1a12;
            max-height: 450px;
            overflow-y: auto;
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-size: 20px;
            color: gold;
            margin-bottom: 15px;
            border-bottom: 1px solid gold;
            padding-bottom: 8px;
        }

        /* Карточки */
        .item-card {
            background: #2a2418;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid gold;
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .item-icon {
            width: 60px;
            height: 60px;
            background: #3a2e1e;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            border: 1px solid gold;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: bold;
            color: gold;
            font-size: 16px;
        }

        .item-desc {
            font-size: 12px;
            color: #c4a747;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-price {
            color: #ffaa33;
            font-weight: bold;
            font-size: 18px;
        }

        .buy-btn {
            background: linear-gradient(135deg, #5d4c33 0%, #3a2e1e 100%);
            color: gold;
            border: 1px solid gold;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .buy-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .owned-badge {
            background: #4a6b3a;
            color: gold;
            padding: 8px 20px;
            border-radius: 30px;
        }

        /* Ачивки */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .achievement-card {
            background: #2a2418;
            border: 1px solid gold;
            border-radius: 15px;
            padding: 12px;
            text-align: center;
        }

        .achievement-card.done {
            background: #4a6b3a;
        }

        /* Ивент */
        .event-banner {
            background: linear-gradient(90deg, #aa44ff, #6622cc);
            padding: 10px;
            text-align: center;
            color: white;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Уведомления */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 15px 25px;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            z-index: 1000;
            transition: 0.3s;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification.success {
            background: linear-gradient(135deg, gold, #ffaa00);
            border: 2px solid #fff;
        }

        .notification.event {
            background: linear-gradient(135deg, #aa44ff, #6622cc);
            color: white;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Музыка -->
        <div class="music-btn" id="musicBtn">🔇</div>
        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

        <!-- Шапка -->
        <div class="header">
            <h1>🧠 BRAINROT LEGENDS</h1>
            <div class="balance">
                <span id="balance">0</span>
                <div class="coin-icon"></div>
            </div>
        </div>

        <!-- Престиж -->
        <div class="prestige-bar" onclick="doPrestige()" id="prestigeBar">
            ✨ ПРЕСТИЖ <span id="prestigeLevel">0</span> ✨ Множитель x<span id="prestigeMult">1.0</span>
        </div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div>Уровень<br><span class="stat-value" id="level">1</span></div>
            <div>Клики<br><span class="stat-value" id="totalClicks">0</span></div>
            <div>Доход/сек<br><span class="stat-value" id="income">0</span></div>
            <div>Стрик<br><span class="stat-value" id="streak">0</span></div>
        </div>

        <!-- Табы -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('clicker')">👆 КЛИК</div>
            <div class="tab" onclick="switchTab('shop')">🏪 БИЗНЕС</div>
            <div class="tab" onclick="switchTab('upgrades')">⚡ ПРОКАЧКА</div>
            <div class="tab" onclick="switchTab('achievements')">🏆 АЧИВКИ</div>
            <div class="tab" onclick="switchTab('skins')">🎨 СКИНЫ</div>
        </div>

        <!-- Кликер -->
        <div id="clickerSection" class="clicker-section">
            <div id="clickButton"></div>
            <div class="click-info" style="color:gold; font-size:20px;">
                Сила: <span id="clickPower">1</span>
            </div>
        </div>

        <!-- Прогресс -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="levelProgress"></div>
            </div>
            <div style="display:flex; justify-content:space-between; color:gold; margin-top:5px;">
                <span id="currentLevel">Уровень 1</span>
                <span id="nextLevelExp">До 2: 100</span>
            </div>
        </div>

        <!-- Ежедневная награда -->
        <div class="daily-reward" onclick="claimDaily()" id="dailyReward">
            🔥 ЕЖЕДНЕВНАЯ НАГРАДА 🔥<br>
            <span id="dailyInfo">Заберите +100 монет!</span>
        </div>

        <!-- Баннер ивента -->
        <div id="eventBanner" class="event-banner" style="display:none;"></div>

        <!-- Секции -->
        <div id="shopSection" class="section">
            <div class="section-title">🏪 БИЗНЕС (пассивный доход)</div>
            <div id="shopItems"></div>
        </div>

        <div id="upgradesSection" class="section">
            <div class="section-title">⚡ УЛУЧШЕНИЯ КЛИКА</div>
            <div id="upgradeItems"></div>
        </div>

        <div id="achievementsSection" class="section">
            <div class="section-title">🏆 ДОСТИЖЕНИЯ</div>
            <div class="achievement-grid" id="achievementsList"></div>
        </div>

        <div id="skinsSection" class="section">
            <div class="section-title">🎨 СКИНЫ НА МОЗГ</div>
            <div id="skinsList"></div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // ========== TELEGRAM INIT ==========
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation(); // Спросит при выходе

        // Показываем имя пользователя
        let username = 'Игрок';
        if (tg.initDataUnsafe?.user) {
            username = tg.initDataUnsafe.user.first_name || 'Игрок';
            if (tg.initDataUnsafe.user.last_name) {
                username += ' ' + tg.initDataUnsafe.user.last_name;
            }
        }

        // ========== МУЗЫКА ==========
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let musicPlaying = false;

        musicBtn.onclick = () => {
            if (musicPlaying) {
                music.pause();
                musicBtn.textContent = '🔇';
            } else {
                music.play().catch(() => {
                    showNotification('🎵 Нажми на экран для музыки', 'event');
                });
                musicBtn.textContent = '🔊';
            }
            musicPlaying = !musicPlaying;
        };

        // ========== МЕГА-СОХРАНЕНИЕ ==========
        let gameState = {
            username: username,
            balance: 100,
            clickPower: 1,
            totalClicks: 0,
            
            level: 1,
            exp: 0,
            expToNext: 100,
            
            prestige: {
                level: 0,
                multiplier: 1.0,
                points: 0
            },
            
            daily: {
                lastClaim: null,
                streak: 0
            },
            
            businesses: [
                { id: 'b1', name: '🧠 Лавка мозгов', emoji: '🧠', price: 50, income: 1, count: 0 },
                { id: 'b2', name: '🏭 Фабрика мыслей', emoji: '🏭', price: 250, income: 5, count: 0 },
                { id: 'b3', name: '🏦 Банк', emoji: '🏦', price: 1500, income: 30, count: 0 },
                { id: 'b4', name: '🚀 Нейросеть', emoji: '🚀', price: 10000, income: 200, count: 0 }
            ],
            
            upgrades: [
                { id: 'u1', name: '👓 Очки', price: 100, bonus: 2, bought: false },
                { id: 'u2', name: '☕ Кофе', price: 600, bonus: 10, bought: false },
                { id: 'u3', name: '💊 Таблетки', price: 3000, bonus: 50, bought: false },
                { id: 'u4', name: '⚡ Энергетик', price: 20000, bonus: 300, bought: false }
            ],
            
            achievements: [
                { id: 'a1', name: '1000 кликов', emoji: '👆', requirement: 1000, reward: 5000, done: false },
                { id: 'a2', name: '10000 кликов', emoji: '⚡', requirement: 10000, reward: 50000, done: false },
                { id: 'a3', name: 'Магнат', emoji: '💰', requirement: 10, reward: 100000, done: false },
                { id: 'a4', name: 'Легенда', emoji: '👑', requirement: 50, reward: 500000, done: false }
            ],
            
            skins: [
                { id: 's1', name: 'Обычный', emoji: '🧠', bonus: 1.0, price: 0, owned: true },
                { id: 's2', name: 'Золотой', emoji: '🥇', bonus: 1.5, price: 50000, owned: false },
                { id: 's3', name: 'Алмазный', emoji: '💎', bonus: 2.0, price: 200000, owned: false },
                { id: 's4', name: 'Кибер', emoji: '🤖', bonus: 3.0, price: 1000000, owned: false }
            ],
            currentSkin: 's1',
            
            activeEvent: null,
            eventEndTime: 0
        };

        // ========== DOM ==========
        const balanceEl = document.getElementById('balance');
        const clickPowerEl = document.getElementById('clickPower');
        const levelEl = document.getElementById('level');
        const totalClicksEl = document.getElementById('totalClicks');
        const incomeEl = document.getElementById('income');
        const streakEl = document.getElementById('streak');
        const prestigeLevelEl = document.getElementById('prestigeLevel');
        const prestigeMultEl = document.getElementById('prestigeMult');
        const levelProgress = document.getElementById('levelProgress');
        const currentLevelEl = document.getElementById('currentLevel');
        const nextLevelExpEl = document.getElementById('nextLevelExp');
        const dailyInfoEl = document.getElementById('dailyInfo');
        const eventBanner = document.getElementById('eventBanner');
        const clickButton = document.getElementById('clickButton');
        
        const shopItemsEl = document.getElementById('shopItems');
        const upgradeItemsEl = document.getElementById('upgradeItems');
        const achievementsListEl = document.getElementById('achievementsList');
        const skinsListEl = document.getElementById('skinsList');

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(msg, type = 'success') {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = `notification ${type} show`;
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // ========== МОНЕТКА ПРИ КЛИКЕ ==========
        function createFloatingCoin(x, y) {
            const coin = document.createElement('div');
            coin.className = 'coin-icon';
            coin.style.position = 'absolute';
            coin.style.width = '30px';
            coin.style.height = '30px';
            coin.style.left = (x - 15) + 'px';
            coin.style.top = (y - 15) + 'px';
            coin.style.animation = 'floatUp 1s forwards';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 1000);
        }

        // ========== ПАССИВНЫЙ ДОХОД ==========
        function getPassiveIncome() {
            let total = 0;
            gameState.businesses.forEach(b => total += b.income * b.count);
            total *= gameState.prestige.multiplier;
            const skin = gameState.skins.find(s => s.id === gameState.currentSkin);
            total *= skin?.bonus || 1;
            return Math.floor(total);
        }

        // ========== ОПЫТ ==========
        function addExp(amount) {
            gameState.exp += amount * gameState.prestige.multiplier;
            
            while (gameState.exp >= gameState.expToNext) {
                gameState.level++;
                gameState.exp -= gameState.expToNext;
                gameState.expToNext = Math.floor(gameState.expToNext * 1.5);
                showNotification(`🎉 УРОВЕНЬ ${gameState.level}!`, 'event');
                checkAchievements();
                
                // Отправляем в Telegram
                tg.HapticFeedback.notification('success'); // Вибрация
            }
        }

        // ========== ПРОВЕРКА АЧИВОК ==========
        function checkAchievements() {
            gameState.achievements.forEach(a => {
                if (!a.done) {
                    let completed = false;
                    
                    if (a.id === 'a1' && gameState.to
